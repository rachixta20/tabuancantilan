[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring',
           'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.zip', 'php83Extensions.gd',
           'php83Extensions.fileinfo', 'php83Extensions.tokenizer', 'php83Extensions.bcmath',
           'php83Extensions.pcntl', 'nodejs_20', 'nodePackages.npm']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci']

[phases.build]
cmds = [
  'npm run build',
  'php artisan config:cache',
  'php artisan route:cache',
  'php artisan view:cache',
]

[start]
cmd = 'bash start.sh'
